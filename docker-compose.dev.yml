services:
  mongo:
    image: mongo:7
    container_name: cashfb-mongo
    restart: unless-stopped
    command: ['--replSet', 'rs0', '--bind_ip_all']
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: >
        mongosh --quiet --eval "
          try { rs.status().ok }
          catch (e) {
            rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] }).ok
          }
        "
      interval: 5s
      timeout: 30s
      start_period: 10s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: cashfb-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mongo-data:
  redis-data:
